services:
  access_request.home_assistant_client:
    class: Drupal\access_request\HomeAssistantClient
    arguments: ['@config.factory', '@http_client', '@logger.factory', '@state']

  access_request.service:
    class: Drupal\access_request\AccessRequestService
    arguments: ['@config.factory', '@logger.factory', '@http_client', '@current_user', '@entity_type.manager', '@uuid', '@request_stack', '@current_route_match', '@state', '@access_request.home_assistant_client', '@access_control_api_logger.access_status_evaluator']
