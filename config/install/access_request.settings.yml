python_gateway_url: 'https://server.dev.access.makehaven.org/toolauth/req'
timeout_seconds: 5
web_hmac_secret: ''
home_assistant:
  base_url: 'https://homeassistant.dev.access.makehaven.org'
  enabled: false
  timeout_seconds: 5
asset_map: |
  backdoor:
    name: Back Door
    description: Main rear entrance to the makerspace, usually used for staff or after-hours access.
    image: ''
    category: 'doors'
    ha_service: 'esphome.backdooractivator_enable'
  chapeldoor:
    name: Chapel Door
    description: Street-facing entrance on Chapel Street, primary door for members and visitors.
    image: ''
    category: 'doors'
    ha_service: 'esphome.chapeldooractivator_enable'
  spacedoor:
    name: Space Door
    description: Internal access door to the makerspace floor and shared work areas.
    image: ''
    category: 'doors'
    ha_service: 'esphome.spacedooractivator_enable'
dry_run: false
user_block_field: ''
